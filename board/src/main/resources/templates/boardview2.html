<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사진 보기</title>
    <style>
        /* 스타일은 위에서 주어진 CSS와 동일합니다. */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .content {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }

        .contents {
            display: flex; /* flexbox 사용 */
            justify-content: center; /* 가로 방향 가운데 정렬 */
            align-items: center; /* 세로 방향 가운데 정렬 */
            height: 500px; /* 높이 조절, 필요에 따라 조정 */
            background: #fafafa;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            overflow: hidden; /* 이미지가 부모 요소를 넘어가지 않도록 설정 */
        }

        img {
            max-width: 100%; /* 부모 요소의 폭에 맞게 조정 */
            max-height: 100%; /* 부모 요소의 높이에 맞게 조정 */
            width: auto; /* 비율 유지 */
            height: auto; /* 비율 유지 */
            object-fit: contain; /* 이미지 비율 유지하며 크기 조정 */
        }

        .button-group {
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            margin-right: 10px;
            background-color: #007bff;
            border: none;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .button:hover {
            background-color: #0056b3;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .button-secondary {
            background-color: #6c757d;
        }

        .button-secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 th:text="${board.title}"></h1>
        <div class="content">
            <p th:text="${board.content}"></p>
        </div>


    <div class="container">
        <div class="contents">
            <img th:src="@{${board.filepath}}" alt="Photo"/>
        </div>

        <div class="button-group">
            <a href="#" onclick="history.back();" class="button">돌아가기</a>
        </div>
    </div>
</body>
</html>
